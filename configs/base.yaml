# Base configuration — all dataset configs inherit from this
project:
  name: "medical-image-diagnosis-vit"
  seed: 42
  output_dir: "results"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

training:
  epochs: 50
  batch_size: 32
  num_workers: 4
  pin_memory: true
  mixed_precision: true
  gradient_accumulation_steps: 1
  early_stopping_patience: 10
  gradient_clip_norm: 1.0
  resume_from: null

optimizer:
  name: "adamw"
  lr: 1.0e-4
  weight_decay: 1.0e-4
  momentum: 0.9       # for SGD
  eps: 1.0e-8

scheduler:
  name: "cosine"      # cosine | step | plateau | onecycle
  warmup_epochs: 5
  min_lr: 1.0e-6
  step_size: 10       # for StepLR
  gamma: 0.1          # for StepLR

model:
  name: "vit_b16"     # vit_b16 | vit_l16 | efficientnet_b0 | efficientnet_b3
  pretrained: true
  freeze_backbone: false
  freeze_epochs: 5    # unfreeze backbone after N epochs (0 = never freeze)
  dropout: 0.1
  image_size: 224

loss:
  name: "cross_entropy"   # cross_entropy | focal | weighted_cross_entropy
  label_smoothing: 0.1
  focal_alpha: 0.25
  focal_gamma: 2.0

data:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  image_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: false
  rotation: 15
  brightness: 0.2
  contrast: 0.2
  gaussian_noise: 0.05
  clahe: true
  random_crop: true
  mixup_alpha: 0.0    # 0.0 = disabled
  cutmix_alpha: 0.0   # 0.0 = disabled

logging:
  wandb:
    enabled: false
    project: "medical-image-diagnosis-vit"
    entity: null
  tensorboard:
    enabled: true

inference:
  tta_enabled: false
  tta_steps: 5
  batch_size: 64

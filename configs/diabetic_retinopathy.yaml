# Diabetic Retinopathy Detection
_base_: "base.yaml"

project:
  name: "diabetic-retinopathy"

dataset:
  name: "diabetic_retinopathy"
  path: "datasets/diabetic_retinopathy"
  num_classes: 5
  classes:
    - "No DR"
    - "Mild"
    - "Moderate"
    - "Severe"
    - "Proliferative DR"
  class_weights: [1.0, 2.0, 2.0, 3.0, 3.0]
  description: "APTOS 2019 Blindness Detection"
  download_url: "https://www.kaggle.com/competitions/aptos2019-blindness-detection"

model:
  name: "efficientnet_b3"
  image_size: 512
  dropout: 0.4

training:
  epochs: 60
  batch_size: 16
  early_stopping_patience: 15

loss:
  name: "weighted_cross_entropy"
  label_smoothing: 0.1

data:
  image_size: 512
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

augmentation:
  clahe: true
  horizontal_flip: true
  vertical_flip: false
  rotation: 360
  brightness: 0.2
  contrast: 0.3
  gaussian_noise: 0.05

# Optuna hyperparameter search configuration
study:
  name: "medvit-hparam-search"
  direction: "maximize"    # maximize val_f1
  metric: "val_f1"
  n_trials: 50
  timeout: 3600            # seconds (1 hour)
  n_jobs: 1
  sampler: "tpe"           # tpe | random | cmaes
  pruner: "median"         # median | hyperband | none

search_space:
  lr:
    type: "float"
    low: 1.0e-5
    high: 1.0e-2
    log: true

  weight_decay:
    type: "float"
    low: 1.0e-6
    high: 1.0e-2
    log: true

  batch_size:
    type: "categorical"
    choices: [16, 32, 64]

  dropout:
    type: "float"
    low: 0.0
    high: 0.5

  optimizer:
    type: "categorical"
    choices: ["adam", "adamw", "sgd"]

  scheduler:
    type: "categorical"
    choices: ["cosine", "step", "plateau"]

  model:
    type: "categorical"
    choices: ["vit_b16", "efficientnet_b0", "efficientnet_b3"]

  image_size:
    type: "categorical"
    choices: [224, 256, 384]

  warmup_epochs:
    type: "int"
    low: 0
    high: 10

  label_smoothing:
    type: "float"
    low: 0.0
    high: 0.2
